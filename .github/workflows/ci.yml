name: Vitals Publisher - Tests & Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      
      - name: Check formatting with black
        run: black --check src tests --line-length=120
      
      - name: Check import sorting with isort
        run: isort --check-only src tests --profile=black
      
      - name: Lint with flake8
        run: |
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests --count --max-complexity=10 --max-line-length=120 --statistics
      
      - name: Type check with mypy
        run: |
          mypy src --ignore-missing-imports

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=80
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
      
      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
        continue-on-error: true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      
      - name: Run bandit security check
        run: |
          bandit -r src -f json -o bandit-report.json
          bandit -r src -f txt
      
      - name: Dependency security check
        run: |
          safety check --json > safety-report.json || true
        continue-on-error: true
      
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
        continue-on-error: true

  contract-and-data-gate:
    name: Contract + Demo Data Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      SCENARIO: sepsis
      SYNTHEA_DATA_PATH: data/synthea/demo/csv
      PATIENT_ID: 79590754-4679-dafd-8aab-103706580fff
      SEED: "42"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify contract and real demo dataset behavior
        run: |
          test -d data/synthea/demo/csv
          pytest -v --maxfail=1 \
            tests/test_contract_schema_v2.py \
            tests/test_demo_dataset.py

  smoke-test:
    name: Build & Smoke-test Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, contract-and-data-gate]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: medtech-vitals-publisher:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke tests
        uses: ./.github/actions/smoke-test
        with:
          image: medtech-vitals-publisher:ci

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, test, security, contract-and-data-gate, smoke-test]
    if: always()
    
    steps:
      - name: Check if all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" && "${{ needs.lint.result }}" != "skipped" ]] || \
             [[ "${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "skipped" ]] || \
             [[ "${{ needs.security.result }}" != "success" && "${{ needs.security.result }}" != "skipped" ]] || \
             [[ "${{ needs['contract-and-data-gate'].result }}" != "success" && "${{ needs['contract-and-data-gate'].result }}" != "skipped" ]] || \
             [[ "${{ needs['smoke-test'].result }}" != "success" && "${{ needs['smoke-test'].result }}" != "skipped" ]]; then
            echo "❌ Some checks failed"
            exit 1
          else
            echo "✅ All checks passed"
            exit 0
          fi