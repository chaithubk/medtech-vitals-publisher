name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: Custom version override (for example 2.0.0)
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          last_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)"
          has_tag=true
          if [[ -z "$last_tag" ]]; then
            last_tag="v0.0.0"
            has_tag=false
          fi

          previous_version="${last_tag#v}"
          custom_version="${{ inputs.custom_version }}"

          if [[ -n "$custom_version" ]]; then
            if [[ "$custom_version" != v* ]]; then
              new_version="v$custom_version"
            else
              new_version="$custom_version"
            fi
          else
            IFS='.' read -r major minor patch <<< "$previous_version"

            case "${{ inputs.bump_type }}" in
              patch)
                patch=$((patch + 1))
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              *)
                echo "Unsupported bump_type: ${{ inputs.bump_type }}" >&2
                exit 1
                ;;
            esac

            new_version="v${major}.${minor}.${patch}"
          fi

          if [[ ! "$new_version" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Resolved version '$new_version' is invalid. Expected format vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

          compare_versions() {
            local left="${1#v}"
            local right="${2#v}"
            local left_major left_minor left_patch right_major right_minor right_patch

            IFS='.' read -r left_major left_minor left_patch <<< "$left"
            IFS='.' read -r right_major right_minor right_patch <<< "$right"

            if (( left_major != right_major )); then
              (( left_major > right_major ))
              return
            fi

            if (( left_minor != right_minor )); then
              (( left_minor > right_minor ))
              return
            fi

            (( left_patch > right_patch ))
          }

          if ! compare_versions "$new_version" "$last_tag"; then
            echo "Resolved version '$new_version' must be strictly greater than previous version '$last_tag'." >&2
            exit 1
          fi

          echo "last_tag=$last_tag" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "has_tag=$has_tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          last_tag="${{ steps.version.outputs.last_tag }}"
          new_version="${{ steps.version.outputs.new_version }}"
          has_tag="${{ steps.version.outputs.has_tag }}"
          changelog_file="$RUNNER_TEMP/changelog.md"
          sections_dir="$(mktemp -d)"

          feat_file="$sections_dir/feat.txt"
          fix_file="$sections_dir/fix.txt"
          maintenance_file="$sections_dir/maintenance.txt"
          docs_file="$sections_dir/docs.txt"
          test_file="$sections_dir/test.txt"
          other_file="$sections_dir/other.txt"

          touch "$feat_file" "$fix_file" "$maintenance_file" "$docs_file" "$test_file" "$other_file"

          if [[ "$has_tag" == "true" ]]; then
            commit_lines="$(git log "$last_tag"..HEAD --pretty=format:'- %s (%h)')"
          else
            commit_lines="$(git log --pretty=format:'- %s (%h)')"
          fi

          if [[ -z "$commit_lines" ]]; then
            echo "No commits found since the last release. Refusing to create an empty release." >&2
            exit 1
          fi

          while IFS= read -r line; do
            [[ -z "$line" ]] && continue

            case "$line" in
              "- feat:"*)
                printf '%s\n' "$line" >> "$feat_file"
                ;;
              "- fix:"*)
                printf '%s\n' "$line" >> "$fix_file"
                ;;
              "- chore:"*|"- ci:"*|"- build:"*)
                printf '%s\n' "$line" >> "$maintenance_file"
                ;;
              "- docs:"*)
                printf '%s\n' "$line" >> "$docs_file"
                ;;
              "- test:"*)
                printf '%s\n' "$line" >> "$test_file"
                ;;
              *)
                printf '%s\n' "$line" >> "$other_file"
                ;;
            esac
          done <<< "$commit_lines"

          append_section() {
            local title="$1"
            local file_path="$2"

            if [[ -s "$file_path" ]]; then
              {
                printf '### %s\n\n' "$title"
                cat "$file_path"
                printf '\n'
              } >> "$changelog_file"
            fi
          }

          printf "## What's Changed in %s (%s)\n\n" "$new_version" "$(date -u +%F)" > "$changelog_file"
          append_section "🚀 New Features" "$feat_file"
          append_section "🐛 Bug Fixes" "$fix_file"
          append_section "🔧 Maintenance" "$maintenance_file"
          append_section "📝 Documentation" "$docs_file"
          append_section "🧪 Tests" "$test_file"
          append_section "📦 Other Changes" "$other_file"

          echo "changelog_file=$changelog_file" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail

          new_version="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$new_version" -m "Release $new_version"
          git push origin "$new_version"

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail

          new_version="${{ steps.version.outputs.new_version }}"
          changelog_file="${{ steps.changelog.outputs.changelog_file }}"
          prerelease_flag=()

          if [[ "${{ inputs.prerelease }}" == 'true' ]]; then
            prerelease_flag+=(--prerelease)
          fi

          gh release create "$new_version" \
            --title "Release $new_version" \
            --notes-file "$changelog_file" \
            "${prerelease_flag[@]}"
